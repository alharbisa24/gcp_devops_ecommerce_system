steps:
  # =========================
  # FRONTEND
  # =========================

  - id: 'build-frontend'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - --pull
      - --no-cache
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/devops-demo/frontend:$COMMIT_SHA
      - ./app/frontend

  - id: 'scan-frontend'
    name: 'aquasec/trivy:latest'
    entrypoint: 'trivy'
    args:
      - image
      - --scanners
      - vuln
      - --exit-code
      - '1'
      - --severity
      - 'HIGH,CRITICAL'
      - --ignore-unfixed
      - us-central1-docker.pkg.dev/$PROJECT_ID/devops-demo/frontend:$COMMIT_SHA

  - id: 'push-frontend'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/devops-demo/frontend:$COMMIT_SHA

  # =========================
  # backend
  # =========================

  - id: 'build-backend'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - --pull
      - --no-cache
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/devops-demo/backend:$COMMIT_SHA
      - ./app/backend

  - id: 'scan-backend'
    name: 'aquasec/trivy:latest'
    entrypoint: 'trivy'
    args:
      - image
      - --scanners
      - vuln
      - --exit-code
      - '1'
      - --severity
      - 'HIGH,CRITICAL'
      - --ignore-unfixed
      - us-central1-docker.pkg.dev/$PROJECT_ID/devops-demo/backend:$COMMIT_SHA

  - id: 'push-backend'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/devops-demo/backend:$COMMIT_SHA

  # =========================
  # ORDER API
  # =========================

  - id: 'build-order'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - --pull
      - --no-cache
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/devops-demo/order:$COMMIT_SHA
      - ./app/order-service

  - id: 'scan-order'
    name: 'aquasec/trivy:latest'
    entrypoint: 'trivy'
    args:
      - image
      - --scanners
      - vuln
      - --exit-code
      - '1'
      - --severity
      - 'HIGH,CRITICAL'
      - --ignore-unfixed
      - us-central1-docker.pkg.dev/$PROJECT_ID/devops-demo/order:$COMMIT_SHA

  - id: 'push-order'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/devops-demo/order:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY