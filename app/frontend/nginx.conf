server {
  listen 80;
  server_name _;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /register {
    proxy_pass http://backend-api.backend.svc.cluster.local:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /login {
    proxy_pass http://backend-api.backend.svc.cluster.local:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /items {
    proxy_pass http://backend-api.backend.svc.cluster.local:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /orders {
    proxy_pass http://order-api.order.svc.cluster.local:8001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
