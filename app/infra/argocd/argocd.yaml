apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-demo
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/alharbisa24/gcp_devops_ecommerce_system.git
    targetRevision: main
    path: app/infra/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true