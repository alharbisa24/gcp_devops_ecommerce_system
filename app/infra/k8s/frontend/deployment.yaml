apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: us-central1-docker.pkg.dev/project-3a15e654-5e42-4c1e-9db/devops-demo/frontend
        imagePullPolicy: Always
        ports:
        - containerPort: 80